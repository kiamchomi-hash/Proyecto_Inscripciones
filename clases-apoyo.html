    <style>
        :root {
            --color-deep-dark-bg: #013729;
            --color-card-bg: #1c2f31;
            --color-highlight: #00c7b1;
            --color-secondary-highlight: #48b3a4;
            --color-text-light: #7ca19b;
            --color-text-normal: white;
            --color-accent: #00ffe1;
            --color-surface: #162f2e;
            --color-gold: #e69b05;
            --color-special: #7c207b;
            --cau-brand-blue: #005587;
            --cau-brand-green: #058c70;
            --navbar-height: 60px;
            --sidebar-w: 230px;
            --mat-accent: #00c7b1;
        }
 
        * { box-sizing: border-box; }
 
        body {
            font-family: 'DM Sans', sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
 
        /* ════════════════════════════════════════
           LAYOUT SHELL
           ════════════════════════════════════════ */
        .shell {
            flex: 1; min-height: 0;
            display: flex; flex-direction: column;
            max-width: 1600px; width: 100%;
            margin: 0 auto; padding: 0.35rem;
        }
 
        .frame {
            flex: 1; min-height: 0;
            display: flex; flex-direction: column;
            border-radius: 0.6rem;
            overflow: hidden;
            background: #091a18;
        }
 
        @media (min-width: 1024px) {
            .frame { flex-direction: row; }
        }
 
        /* ════════════════════════════════════════
           SIDEBAR
           ════════════════════════════════════════ */
        .sidebar {
            display: flex;
            background: #051211;
            flex-shrink: 0;
        }
 
        @media (max-width: 1023px) {
            .sidebar {
                overflow-x: auto; scrollbar-width: none;
                border-bottom: 3px solid var(--mat-accent);
            }
            .sidebar::-webkit-scrollbar { display: none; }
        }
 
        @media (min-width: 1024px) {
            .sidebar {
                flex-direction: column;
                width: var(--sidebar-w);
                min-width: var(--sidebar-w);
            }
        }
 
        .sb-btn {
            flex: 1;
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.65rem 1.15rem;
            background: transparent; border: none; cursor: pointer;
            color: #6b8f8a;
            position: relative;
            transition: color 0.25s, background 0.25s;
            min-width: 130px;
        }
 
        @media (min-width: 1024px) {
            .sb-btn {
                min-width: unset;
                padding: 0 1.25rem;
            }
        }
 
        .sb-btn__bar {
            position: absolute;
            background: var(--mat-accent);
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }
 
        /* Mobile: bottom bar */
        @media (max-width: 1023px) {
            .sb-btn__bar {
                bottom: 0; left: 10%; right: 10%; height: 3px;
                transform: scaleX(0);
            }
        }
 
        /* Desktop: left bar */
        @media (min-width: 1024px) {
            .sb-btn__bar {
                left: 0; top: 15%; bottom: 15%; width: 4px;
                transform: scaleY(0);
                border-radius: 0 3px 3px 0;
            }
        }
 
        .sb-btn__dot {
            width: 8px; height: 8px;
            border-radius: 2px;
            background: currentColor;
            opacity: 0.4;
            transition: all 0.3s;
            flex-shrink: 0;
        }
 
        .sb-btn__txt {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
 
        @media (min-width: 1024px) {
            .sb-btn__txt { white-space: normal; }
        }
 
        .sb-btn:hover { color: #a0c5c0; background: rgba(255,255,255,0.02); }
 
        .sb-btn.on {
            color: white;
            background: rgba(0,199,177,0.06);
        }
 
        .sb-btn.on .sb-btn__bar {
            transform: scaleX(1);
        }
 
        @media (min-width: 1024px) {
            .sb-btn.on .sb-btn__bar { transform: scaleY(1); }
        }
 
        .sb-btn.on .sb-btn__dot {
            opacity: 1;
            background: var(--mat-accent);
            box-shadow: 0 0 6px var(--mat-accent);
        }
 
        /* ════════════════════════════════════════
           CONTENT BODY
           ════════════════════════════════════════ */
        .body {
            flex: 1; min-height: 0;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
 
        @media (max-width: 1023px) {
            .body {
                overflow-y: auto; scrollbar-width: none;
            }
            .body::-webkit-scrollbar { display: none; }
        }
 
        .panel {
            display: flex; flex-direction: column;
            flex: 1; min-height: 0;
            animation: fadeUp 0.35s cubic-bezier(0.4,0,0.2,1) forwards;
        }
 
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
 
        /* ──────────────────────────────────────
           ROW 1 — Temas + Carrusel
           ────────────────────────────────────── */
        .r1 {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 1fr;
            background: #0d2624;
        }
 
        @media (min-width: 1024px) {
            .r1 { grid-template-columns: 1fr 340px; }
        }
 
        .r1-temas {
            padding: 0.75rem 1.2rem;
        }
 
        .lbl {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.55rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            color: var(--mat-accent);
            margin-bottom: 0.4rem;
            display: block;
        }
 
        .pills {
            display: flex; flex-wrap: wrap; gap: 0.35rem;
        }
 
        .pill {
            font-family: 'Atkinson Hyperlegible', sans-serif;
            font-size: 0.75rem; font-weight: 700;
            padding: 0.4rem 0.85rem;
            border-radius: 9999px;
            background: rgba(0,199,177,0.12);
            color: #b8e4de;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.01em;
            transition: all 0.2s;
        }
 
        .pill:hover {
            background: var(--color-highlight);
            color: #051211;
        }
 
        /* Carrusel de imágenes */
        .r1-carousel {
            position: relative;
            overflow: hidden;
            min-height: 130px;
            background: #081c1a;
            border-left: 1px solid rgba(255,255,255,0.04);
        }
 
        @media (max-width: 1023px) {
            .r1-carousel {
                min-height: 160px;
                border-left: none;
                border-top: 1px solid rgba(255,255,255,0.04);
            }
        }
 
        .carousel-track {
            display: flex;
            height: 100%;
            position: absolute; inset: 0;
            transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
        }
 
        .carousel-track img {
            width: 100%; height: 100%;
            object-fit: cover;
            flex-shrink: 0;
            display: block;
        }
 
        .carousel-dots {
            position: absolute; bottom: 8px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 5px; z-index: 2;
        }
 
        .carousel-dots button {
            width: 7px; height: 7px;
            border-radius: 50%; border: none;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.25s;
            padding: 0;
        }
 
        .carousel-dots button.on {
            background: var(--color-accent);
            box-shadow: 0 0 6px rgba(0,255,225,0.5);
            width: 18px; border-radius: 4px;
        }
 
        .carousel-nav {
            position: absolute; top: 50%; right: 8px;
            transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 4px; z-index: 2;
        }
 
        .carousel-nav button {
            width: 24px; height: 24px;
            border-radius: 4px; border: none;
            background: rgba(0,0,0,0.5);
            color: white; cursor: pointer;
            font-size: 0.7rem;
            display: grid; place-items: center;
            transition: background 0.2s;
            backdrop-filter: blur(4px);
        }
 
        .carousel-nav button:hover { background: rgba(0,199,177,0.6); }
 
        /* ──────────────────────────────────────
           ROW 2 — Calendario + Logros
           ────────────────────────────────────── */
        .r2 {
            flex: 1; min-height: 0;
            display: grid;
            grid-template-columns: 1fr;
        }
 
        @media (min-width: 1024px) {
            .r2 { grid-template-columns: 1fr 1fr; }
        }
 
        .r2-cal {
            padding: 0.75rem 1.2rem;
            display: flex; flex-direction: column;
            background: #091a18;
            min-height: 0;
        }
 
        @media (min-width: 1024px) {
            .r2-cal {
                border-right: 1px solid rgba(255,255,255,0.04);
                overflow-y: auto; scrollbar-width: none;
            }
            .r2-cal::-webkit-scrollbar { display: none; }
        }
 
        /* ── Calendario rediseñado ── */
        .cal-section {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
            min-height: 0;
        }

        .cal-block { flex-shrink: 0; }

        .cal-block__head {
            display: flex;
            align-items: baseline;
            gap: 0.35rem;
            margin-bottom: 0.35rem;
        }

        .cal-block__month {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.68rem;
            font-weight: 700;
            color: white;
        }

        .cal-block__year {
            font-size: 0.58rem;
            font-weight: 600;
            color: #3d7a72;
        }

        .cg {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }

        .cg-h {
            text-align: center;
            font-size: 0.5rem;
            font-weight: 800;
            color: var(--color-highlight);
            padding: 0 0 3px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-bottom: 1px solid rgba(0,199,177,0.1);
            margin-bottom: 1px;
        }

        .cg-d {
            text-align: center;
            font-size: 0.68rem;
            font-weight: 600;
            padding: 4px 0;
            border-radius: 5px;
            color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.02);
            position: relative;
            transition: background 0.15s;
        }

        .cg-d:hover:not(.past):not(.empty) {
            background: rgba(0,199,177,0.08);
        }

        .cg-d.empty { background: none; }

        .cg-d.past {
            background: #111f1e;
            color: #283d3b;
            pointer-events: none;
        }

        .cg-d.today {
            background: var(--color-highlight);
            color: #051211;
            font-weight: 900;
            box-shadow: 0 2px 8px rgba(0,199,177,0.4);
        }

        .cg-d.tutor {
            background: rgba(0,199,177,0.1);
            color: var(--color-accent);
            font-weight: 700;
            border: 1px solid rgba(0,199,177,0.25);
        }

        .cg-d.tutor.past {
            border-color: transparent;
            color: #283d3b;
            background: #111f1e;
        }

        .cal-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,199,177,0.15), transparent);
            margin: 0.1rem 0;
        }

        .cal-ref {
            display: flex;
            gap: 0.65rem;
            font-size: 0.52rem;
            font-weight: 700;
            color: #4c7a72;
            margin-top: auto;
            padding-top: 0.2rem;
        }

        .cal-ref span {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .cal-ref .sq {
            width: 9px;
            height: 9px;
            border-radius: 3px;
            display: inline-block;
        }

        .cal-ref .sq-t {
            background: rgba(0,199,177,0.1);
            border: 1px solid rgba(0,199,177,0.25);
        }

        .cal-ref .sq-h {
            background: var(--color-highlight);
        }

        .cal-ref .sq-p {
            background: #111f1e;
        }
 
        /* Logros */
        .r2-logros {
            padding: 0.75rem 1.2rem;
            display: flex; flex-direction: column;
            align-items: center;
            text-align: center; gap: 0.5rem;
            background: #0b1f1d;
        }
 
        .big-num {
            font-family: 'Unbounded', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            line-height: 0.9;
            color: var(--color-accent);
            text-shadow: 0 0 40px rgba(0,255,225,0.15);
            letter-spacing: -0.04em;
        }
 
        .big-label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #5ea69d;
        }
 
        .big-sub {
            font-size: 0.58rem;
            color: #3d7a72;
            font-weight: 500;
        }
 
        .mini-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 36px;
        }

        .mini-bars span {
            width: 14px;
            border-radius: 2px 2px 0 0;
            background: rgba(0,199,177,0.12);
        }

        .mini-bars span.hi {
            background: var(--color-highlight);
        }
        .btn-cta {
            margin-top: auto;
            padding: 0.6rem 1.8rem;
            background: linear-gradient(135deg, var(--cau-brand-blue), var(--cau-brand-green));
            color: white;
            font-family: 'Unbounded', sans-serif;
            font-size: 0.6rem; font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            border-radius: 6px; border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
 
        .btn-cta:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(5,140,112,0.4);
        }
 
        /* ──────────────────────────────────────
           ROW 3 — Contacto
           ────────────────────────────────────── */
        .r3 {
            flex-shrink: 0;
            display: flex; flex-direction: column;
            gap: 0.7rem; align-items: center;
            padding: 0.5rem 1.2rem;
            background: var(--color-deep-dark-bg);
        }
 
        @media (min-width: 768px) {
            .r3 { flex-direction: row; justify-content: space-between; }
        }
 
        .loc {
            display: flex; align-items: center; gap: 0.6rem;
        }
 
        .loc__icon {
            width: 34px; height: 34px;
            display: grid; place-items: center;
            border-radius: 6px;
            background: var(--color-highlight);
            flex-shrink: 0;
        }
 
        .loc__icon svg {
            width: 16px; height: 16px;
            color: var(--color-deep-dark-bg);
            stroke-width: 2.5;
        }
 
        .loc__sup {
            display: block;
            font-size: 0.5rem; font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--color-secondary-highlight);
        }
 
        .loc__addr {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.95rem; font-weight: 700;
        }
 
        .wa {
            display: inline-flex; align-items: center; gap: 0.55rem;
            background: #25D366; color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none; font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(37,211,102,0.25);
        }
 
        .wa:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(37,211,102,0.4);
        }
 
        .wa svg { width: 22px; height: 22px; flex-shrink: 0; }
 
        .wa__lines {
            display: flex; flex-direction: column;
            text-align: left; line-height: 1.15;
        }
 
        .wa__top {
            font-size: 0.5rem; font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em; opacity: 0.85;
        }
 
        .wa__bot {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.68rem; font-weight: 600;
        }
    </style>
</head>

        function initCarousel(total) {
            let cur = 0;
            const track = document.getElementById('ctrack');
            const dots = document.getElementById('cdots');
            if (!track || !dots) return;
 
            function go(i) {
                cur = ((i % total) + total) % total;
                track.style.transform = `translateX(-${cur * 100}%)`;
                dots.querySelectorAll('button').forEach((d, idx) => d.classList.toggle('on', idx === cur));
            }
 
            document.getElementById('cnext')?.addEventListener('click', () => go(cur + 1));
            document.getElementById('cprev')?.addEventListener('click', () => go(cur - 1));
            dots.addEventListener('click', e => {
                const b = e.target.closest('button[data-i]');
                if (b) go(+b.dataset.i);
            });
 
            carouselTimer = setInterval(() => go(cur + 1), 4000);

        function cal(days) {
            const n = new Date(), y = n.getFullYear(), mo = n.getMonth();
            const today = n.getDate();
            const mn = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
            const dn = ['Do','Lu','Ma','Mi','Ju','Vi','Sa'];

            // Mes actual
            const tot1 = new Date(y, mo + 1, 0).getDate();
            const off1 = new Date(y, mo, 1).getDay();

            // Mes siguiente (primeros 15 días)
            const nextMo = (mo + 1) % 12;
            const nextY = mo === 11 ? y + 1 : y;
            const off2 = new Date(nextY, nextMo, 1).getDay();

            let h = '<div class="cal-section">';

            // ── Mes actual ──
            h += '<div class="cal-block">';
            h += '<div class="cal-block__head">';
            h += '<span class="cal-block__month">' + mn[mo] + '</span>';
            h += '<span class="cal-block__year">' + y + '</span>';
            h += '</div>';
            h += '<div class="cg">';
            dn.forEach(d => h += '<div class="cg-h">' + d + '</div>');
            for (let i = 0; i < off1; i++) h += '<div class="cg-d empty"></div>';
            for (let d = 1; d <= tot1; d++) {
                const dow = new Date(y, mo, d).getDay();
                const isPast = d < today;
                const isToday = d === today;
                const isTutor = days.includes(dow);
                let c = 'cg-d';
                if (isPast) c += ' past' + (isTutor ? ' tutor' : '');
                else if (isToday) c += ' today';
                else if (isTutor) c += ' tutor';
                h += '<div class="' + c + '">' + d + '</div>';
            }
            h += '</div></div>';

            // Separador
            h += '<div class="cal-divider"></div>';

            // ── Mes siguiente (1-15) ──
            h += '<div class="cal-block">';
            h += '<div class="cal-block__head">';
            h += '<span class="cal-block__month">' + mn[nextMo] + '</span>';
            h += '<span class="cal-block__year">' + nextY + '</span>';
            h += '</div>';
            h += '<div class="cg">';
            dn.forEach(d => h += '<div class="cg-h">' + d + '</div>');
            for (let i = 0; i < off2; i++) h += '<div class="cg-d empty"></div>';
            for (let d = 1; d <= 15; d++) {
                const dow = new Date(nextY, nextMo, d).getDay();
                const isTutor = days.includes(dow);
                let c = 'cg-d';
                if (isTutor) c += ' tutor';
                h += '<div class="' + c + '">' + d + '</div>';
            }
            h += '</div></div>';

            // Leyenda
            h += '<div class="cal-ref">';
            h += '<span><span class="sq sq-t"></span>Tutoría</span>';
            h += '<span><span class="sq sq-h"></span>Hoy</span>';
            h += '<span><span class="sq sq-p"></span>Pasado</span>';
            h += '</div>';

            h += '</div>';
            return h;
        }
 
        function countUp(id, target, ms) {
            const el = document.getElementById(id);
            if (!el) return;
            let v = 0; const inc = target / (ms / 16);
            (function t() {
                v += inc;
                if (v >= target) { el.textContent = target; return; }
                el.textContent = Math.floor(v);
                requestAnimationFrame(t);
            })();
        }
