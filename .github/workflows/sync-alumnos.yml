name: Sync Alumnos CAU desde eCampus

on:
  workflow_dispatch:
    # Se ejecuta solo desde el botón "Sincronizar" del admin o manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run sync alumnos script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ECAMPUS_USERNAME: ${{ secrets.ECAMPUS_USERNAME }}
          ECAMPUS_PASSWORD: ${{ secrets.ECAMPUS_PASSWORD }}
        run: node scripts/sync-alumnos.mjs
